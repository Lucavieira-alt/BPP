<!DOCTYPE html>
<html lang="pt-BR" class="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Painel Ofensores BPP</title>
<meta name="description" content="Dashboard de tratativas Cashout, BPP e PNR — atualizado direto do Google Sheets." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
  :root{
    --background:#fafafb; --foreground:#181818; --card:#ffffff;
    --primary:#ffe600; --primary-fg:#181818;
    --muted:#f3f4f6; --muted-fg:#71727a; --border:#e4e4e8;
    --chart-1:#2fa572; --chart-2:#e5892b; --chart-3:#d6453b; --chart-4:#e9be3f; --chart-5:#3d7fd6;
    --table-orange:#e06a3b; --topbar:#0d1117; --radius:0.5rem;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--background);color:var(--foreground);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{min-height:100vh}
  .wrap{max-width:1400px;margin:0 auto;padding:0 20px}
  /* Topbar */
  .topbar{background:var(--topbar);color:#fff}
  .topbar-in{max-width:1400px;margin:0 auto;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:12px;min-width:0}
  .brand .logo{height:34px;width:auto;flex-shrink:0}
  .brand h1{font-size:18px;font-weight:800;line-height:1.1;letter-spacing:-.01em}
  .brand p{font-size:12px;color:#aab1bd;margin-top:2px}
  .topbar-right{display:flex;align-items:center;gap:14px;flex-shrink:0}
  .stamp{font-size:12px;color:#aab1bd;text-align:right}
  .btn-refresh{display:inline-flex;align-items:center;gap:8px;background:#1f2733;color:#fff;border:1px solid #2d3644;border-radius:999px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s}
  .btn-refresh:hover{background:#2a3340}
  .btn-refresh:disabled{opacity:.6;cursor:not-allowed}
  .btn-refresh svg{width:15px;height:15px}
  .spin{animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  /* Tabs */
  .tabsbar{background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20}
  .tabs{max-width:1400px;margin:0 auto;padding:0 20px;display:flex;gap:4px;overflow-x:auto}
  .tab{appearance:none;background:none;border:none;border-bottom:3px solid transparent;padding:14px 14px;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.02em;color:var(--muted-fg);cursor:pointer;white-space:nowrap;transition:color .15s}
  .tab:hover{color:var(--foreground)}
  .tab.active{color:var(--chart-1);border-bottom-color:var(--chart-1)}
  /* Hero */
  .hero{background:var(--topbar);color:#fff}
  .hero-in{max-width:1400px;margin:0 auto;padding:26px 20px}
  .hero h2{font-size:24px;font-weight:800;letter-spacing:-.02em}
  .hero p{font-size:14px;color:#aab1bd;margin-top:4px}
  main{padding:24px 0 60px}
  /* KPIs */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
  @media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 22px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .kpi .lab{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;color:var(--muted-fg)}
  .kpi .val{font-size:30px;font-weight:800;margin-top:10px;letter-spacing:-.02em}
  .kpi.total .val{color:var(--foreground)} .kpi.pend .val{color:var(--table-orange)}
  .kpi.trat .val{color:var(--chart-1)} .kpi.valor .val{color:var(--table-orange)}
  /* Layout content */
  .grid-main{display:grid;grid-template-columns:320px 1fr;gap:20px;align-items:start}
  @media(max-width:1000px){.grid-main{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .card-h{padding:18px 20px 8px;font-size:16px;font-weight:800}
  .card-sub{padding:0 20px 14px;font-size:13px;color:var(--muted-fg)}
  /* Offenders */
  .offenders{padding:6px 12px 14px;list-style:none}
  .offenders li{display:flex;align-items:center;gap:12px;padding:11px 8px;border-bottom:1px solid var(--border)}
  .offenders li:last-child{border-bottom:none}
  .rank{width:22px;height:22px;flex-shrink:0;border-radius:6px;background:var(--muted);color:var(--muted-fg);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
  .mlp-logo{width:26px;height:26px;flex-shrink:0;border-radius:6px;object-fit:contain;background:#fff;border:1px solid var(--border)}
  .mlp-logo.ph{background:var(--muted)}
  .off-name{flex:1;min-width:0;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .off-nums{text-align:right;flex-shrink:0}
  .off-count{font-size:15px;font-weight:800}
  .off-val{font-size:11px;color:var(--muted-fg)}
  /* Filters */
  .filters{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end;padding:16px 18px;border-bottom:1px solid var(--border)}
  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;color:var(--muted-fg)}
  .field select,.field input{height:38px;border:1px solid var(--border);border-radius:8px;padding:0 12px;font-size:13px;background:var(--card);color:var(--foreground);font-family:inherit;min-width:150px}
  .field input{min-width:200px}
  .field.grow{flex:1;min-width:200px}
  .toggle{height:38px;border:1px solid var(--border);border-radius:8px;padding:0 14px;font-size:12px;font-weight:700;background:var(--card);color:var(--muted-fg);cursor:pointer;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;transition:all .15s;font-family:inherit}
  .toggle:hover{background:var(--muted);color:var(--foreground)}
  .toggle.on{border-color:var(--chart-3);background:rgba(214,69,59,.08);color:var(--chart-3)}
  .toggle svg{width:14px;height:14px}
  .pend-count{margin-left:auto;font-size:13px;color:var(--muted-fg);align-self:center}
  .pend-count b{color:var(--chart-3);font-weight:800}
  /* Table */
  .tbl-scroll{overflow:auto;max-height:680px;border-radius:0 0 12px 12px}
  table{border-collapse:collapse;width:100%;font-size:13px}
  thead th{position:sticky;top:0;background:var(--chart-1);color:#fff;text-align:left;font-weight:700;padding:12px 14px;white-space:nowrap;z-index:2}
  thead.orange th{background:var(--table-orange)}
  tbody td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
  tbody tr:hover{background:var(--muted)}
  tbody tr.tratado{background:rgba(224,106,59,.07)}
  tbody tr.tratado:hover{background:rgba(224,106,59,.12)}
  .id-cell{display:flex;align-items:center;gap:8px}
  .id-txt{font-family:ui-monospace,monospace;font-size:12px;font-variant-numeric:tabular-nums}
  .mlp-cell{display:flex;align-items:center;gap:9px;min-width:0}
  .mlp-cell span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .money{font-family:ui-monospace,monospace;font-variant-numeric:tabular-nums;text-align:right;white-space:nowrap}
  .clamp{max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .btn-justify{display:inline-flex;align-items:center;gap:5px;flex-shrink:0;border:1px solid rgba(224,106,59,.5);background:rgba(224,106,59,.1);color:var(--table-orange);border-radius:7px;padding:3px 9px;font-size:11px;font-weight:700;cursor:pointer;text-decoration:none}
  .btn-justify:hover{background:rgba(224,106,59,.2)}
  .btn-justify svg{width:11px;height:11px}
  .pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700}
  .pill.pend{background:rgba(214,69,59,.12);color:var(--chart-3)}
  .pill.ok{background:rgba(47,165,114,.14);color:var(--chart-1)}
  .hv-flag{color:var(--table-orange);font-weight:700}
  .hv-banner{display:flex;align-items:center;gap:8px;padding:10px 18px;border-bottom:1px solid var(--border);font-size:12px;color:var(--muted-fg)}
  .hv-banner b{color:var(--table-orange)}
  /* Charts */
  .charts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  @media(max-width:1000px){.charts-grid{grid-template-columns:1fr}}
  .donut-wrap{position:relative;height:220px;padding:8px 16px 16px}
  .donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;top:-20px}
  .donut-center .n{font-size:26px;font-weight:800}
  .donut-center .l{font-size:11px;color:var(--muted-fg)}
  .legend{padding:0 18px 18px;display:flex;flex-direction:column;gap:3px}
  .legend button{display:flex;align-items:center;gap:9px;width:100%;text-align:left;background:none;border:none;padding:6px 6px;border-radius:7px;cursor:pointer;font-size:13px;font-family:inherit;color:var(--foreground)}
  .legend button:hover{background:var(--muted)}
  .legend button.off{opacity:.4}
  .legend button.off .lg-name{text-decoration:line-through}
  .dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
  .lg-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lg-pct{font-size:12px;color:var(--muted-fg);font-variant-numeric:tabular-nums}
  .lg-num{width:52px;text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
  .lg-val{width:96px;text-align:right;font-size:12px;color:var(--muted-fg);font-variant-numeric:tabular-nums}
  .bar-wrap{padding:16px 18px 20px;height:460px;position:relative}
  .loading,.error{padding:60px 20px;text-align:center;color:var(--muted-fg);font-size:14px}
  .error{color:var(--chart-3)}
  .mb20{margin-bottom:20px}
</style>
</head>

  function normalize(s){ return (s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toUpperCase().replace(/\s+/g," ").trim(); }
  function getMlpLogo(mlp){ const n = normalize(mlp); for(const [k,src] of LOGO_RULES){ if(n.includes(k)) return LOGO_DATA[src] || null; } return null; }

  /* ============================================================
     HELPERS — espelham lib/format.ts
     ============================================================ */
  const NULLISH = new Set(["null","undefined","nan","n/a","#n/a","#ref!","#value!","#name?","#div/0!","(vazio)","(em branco)"]);
  function isNullish(raw){ if(raw==null) return true; const v=String(raw).trim().toLowerCase(); return v===""||v==="-"||NULLISH.has(v); }
  function cleanText(raw){
    if(raw==null) return "";
    const c = String(raw).replace(/<[^>]*>/g," ").replace(/&nbsp;/g," ").replace(/&amp;/g,"&").replace(/\s+/g," ").trim();
    return isNullish(c) ? "" : c;
  }
  function parseMoney(raw){
    if(raw==null) return 0;
    if(typeof raw==="number") return isFinite(raw)?raw:0;
    const clean = String(raw).replace(/[^0-9.,-]/g,"").replace(/\./g,"").replace(",",".");
    const n = parseFloat(clean); return isFinite(n)?n:0;
  }
  function formatMoney(v,cur){ return new Intl.NumberFormat("pt-BR",{style:"currency",currency:cur,maximumFractionDigits:2}).format(v); }
  function formatNumber(v){ return new Intl.NumberFormat("pt-BR").format(v); }
  function highValueThreshold(cur){ return cur==="USD"?HIGH_VALUE_USD:HIGH_VALUE_USD*USD_TO_BRL; }

  const CLASS_MAP = {
    "DAMAGED - EMBALAJE":"Avaria - Embalagem","DAMAGED - PRODUCTO":"Avaria - Produto","DAMAGED - OPERACION":"Avaria - Operação",
    "ENE - DAMAGED":"ENE - Avaria","LOST ON_ROUTE":"Perda em rota","DELAYED ON ROUTE":"Atraso em rota","DELAYED ENE":"Atraso ENE",
    "FRAUD OUTROS":"Fraude - Outros","FRAUD PNR_C":"Fraude - PNR","FRAUD EMPTY_BOX":"Fraude - Caixa vazia",
    "DEVOLUCION FALLIDA - NO RECIBIDA":"Devolução falha - Não recebida","STOLEN":"Roubo","OTROS":"Outros",
  };
  const TOKEN_MAP = { DAMAGED:"Avaria",LOST:"Perda",DELAYED:"Atraso",FRAUD:"Fraude",STOLEN:"Roubo",OTROS:"Outros",
    EMBALAJE:"Embalagem",PRODUCTO:"Produto",OPERACION:"Operação",EMPTY_BOX:"Caixa vazia",ON_ROUTE:"em rota",
    DEVOLUCION:"Devolução",FALLIDA:"falha",RECIBIDA:"recebida" };
  function translateClassification(raw){
    const v=(raw||"").toString().trim(); if(!v||v.toLowerCase()==="null") return "";
    const up=v.toUpperCase(); if(CLASS_MAP[up]) return CLASS_MAP[up];
    return v.split(/(\s+|-)/).map(p=>TOKEN_MAP[p.toUpperCase()]??p).join("");
  }

  function getMlp(row,tab){ return cleanText(row[TABS[tab].mlpField]) || "Sem MLP"; }
  function getValue(row,tab){ return parseMoney(row[TABS[tab].valueField]); }

  function isTratado(row){
    const pend=(row["Pendência"]||"").toString().trim().toLowerCase();
    if(pend) return pend==="tratado"||pend==="tratada"||pend==="ok";
    const foi=(row["Foi tratado?"]||"").toString().trim().toLowerCase();
    if(foi) return foi==="sim"||foi==="true"||foi==="tratado";
    const forms=(row["Tratativa Forms"]||"").toString().toLowerCase();
    if(forms) return forms.includes("tratado")&&!forms.includes("não")&&!forms.includes("nao");
    return false;
  }

  function isoWeek(d){
    const date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
    const day=date.getUTCDay()||7; date.setUTCDate(date.getUTCDate()+4-day);
    const yearStart=new Date(Date.UTC(date.getUTCFullYear(),0,1));
    return Math.ceil(((date-yearStart)/86400000+1)/7);
  }
  function parseSheetDate(value){
    const v=cleanText(value); if(!v) return null;
    let m=v.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/); if(m) return new Date(+m[3],+m[2]-1,+m[1]);
    m=v.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/); if(m) return new Date(+m[1],+m[2]-1,+m[3]);
    return null;
  }
  function getWeek(row,tab){
    if(tab==="cashout") return cleanText(row["Week"]);
    const f = tab==="bpp" ? "Data do insucesso" : "DATA DO CASO";
    const d = parseSheetDate(row[f]); return d ? String(isoWeek(d)) : "";
  }

  /* ============================================================

  function looksLikeCsv(t){
    const trimmed=(t||"").trimStart(); const head=trimmed.slice(0,40).toLowerCase();
    if(!t||head.startsWith("carregando")||head.startsWith("<")) return false;
    if(/^#(ref|error|n\/a|name|value|div\/0|num|null)[!?]?/i.test(trimmed)) return false;
    return t.includes(",") && /\r|\n/.test(t);
  }
  async function downloadCsv(gid){
    const url=`${SHEET_BASE}/pub?gid=${gid}&single=true&output=csv`;
    for(let i=0;i<8;i++){
      try{
        const res=await fetch(`${url}&_=${Date.now()}`,{cache:"no-store"});
        if(res.ok){ const text=await res.text(); if(looksLikeCsv(text)) return text; }
      }catch(e){}
      if(i<7) await new Promise(r=>setTimeout(r,700*(i+1)));
    }
    throw new Error("Google Sheets indisponível (placeholder 'Carregando…' ou '#REF!' persistente)");
  }

      if(cleanText(r[cfg.mlpField])==="") return false;

      if(GLOBAL_EXCLUDE.some(g=>mlp.includes(g))) return false;
      return true;
    });
    return rows;
  }

  /* ============================================================
     AGREGAÇÕES — espelham as rotas /api
     ============================================================ */
  function computeStats(rows, tab){
    let tratado=0, pendente=0, valorPend=0;
    const byMlp=new Map();
    for(const r of rows){
      if(isTratado(r)){ tratado++; continue; }
      pendente++; const v=getValue(r,tab); valorPend+=v;
      const mlp=getMlp(r,tab);
      const cur=byMlp.get(mlp)||{pendente:0,valor:0}; cur.pendente++; cur.valor+=v; byMlp.set(mlp,cur);
    }
    const offenders=[...byMlp.entries()].map(([mlp,v])=>({mlp,...v}))
      .sort((a,b)=>b.pendente-a.pendente||b.valor-a.valor);
    return { total:rows.length, tratado, pendente, valorPend, offenders };
  }
  function applyFilters(rows, tab, f){
    const q=(f.q||"").trim().toLowerCase();
    return rows.filter(r=>{
      if(f.mlp && f.mlp!=="all" && getMlp(r,tab)!==f.mlp) return false;
      if(f.week && f.week!=="all" && getWeek(r,tab)!==f.week) return false;
      if(f.onlyPending && isTratado(r)) return false;
      if(q){
        const hay=TABS[tab].columns.map(c=>cleanText(r[c.key])).join(" ").toLowerCase();
        if(!hay.includes(q)) return false;
      }
      return true;
    });
  }
  function uniqueValues(rows, tab, getter){
    const s=new Set(); for(const r of rows){ const v=getter(r); if(v) s.add(v); } return [...s];
  }
  function classDistribution(rows){
    const map=new Map();
    for(const r of rows){
      const label=translateClassification(r["CLASIFICATION_LM"])||"Outros";
      const v=parseMoney(r["BPP_CASHOUT_USD"]);
      const cur=map.get(label)||{count:0,valor:0}; cur.count++; cur.valor+=v; map.set(label,cur);
    }
    return [...map.entries()].map(([label,v])=>({label,...v})).sort((a,b)=>b.count-a.count);
  }

  /* ============================================================
     ESTADO
     ============================================================ */
  const state = {
    view: "cashout",
    data: { cashout:null, bpp:null, pnr:null },
    loading:true, error:null, stamp:"",
    filters:{ mlp:"all", week:"all", onlyPending:false, q:"" },
    acomp:{ mlp:"all", week:"all" },
    resumo:{ week:"all" },
    classHidden:new Set(),
  };
  const charts = {};
  function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
  function destroyCharts(){ for(const k in charts){ try{charts[k].destroy()}catch(e){} delete charts[k]; } }

  /* ============================================================
     RENDER — navegação
     ============================================================ */
  function renderNav(){
    document.getElementById("tabs").innerHTML = NAV.map(([id,label])=>
      `<button class="tab ${id===state.view?"active":""}" onclick="selectView('${id}')">${escapeHtml(label)}</button>`).join("");
    const v=VIEWS[state.view];
    document.getElementById("heroTitle").textContent = v.kind==="table" ? TABS[v.tab].label : v.label;
    document.getElementById("heroSub").textContent = v.kind==="table" ? TABS[v.tab].hero : v.hero;
  }
  function selectView(id){
    state.view=id;
    state.filters={ mlp:"all", week:"all", onlyPending:false, q:"" };
    state.classHidden=new Set();
    renderNav(); renderView();
  }
  function renderView(){
    destroyCharts();
    const el=document.getElementById("view");
    if(state.loading){ el.innerHTML='<div class="loading">Carregando bases do Google Sheets…</div>'; return; }
    if(state.error){ el.innerHTML=`<div class="error">${escapeHtml(state.error)}</div>`; return; }
    const v=VIEWS[state.view];
    if(v.kind==="table") return renderTableView(v.tab);
    if(v.kind==="acompanhamento") return renderAcompanhamento();
    if(v.kind==="analise") return renderAnalise();
    if(v.kind==="resumo") return renderResumo();
  }

  function kpiCards(st, cur){
    const pct = st.total? Math.round(st.tratado/st.total*100):0;
    return `<div class="kpis">
      <div class="kpi total"><div class="lab">Total de casos</div><div class="val">${formatNumber(st.total)}</div></div>
      <div class="kpi pend"><div class="lab">Pendentes</div><div class="val">${formatNumber(st.pendente)}</div></div>
      <div class="kpi trat"><div class="lab">Tratados</div><div class="val">${formatNumber(st.tratado)} (${pct}%)</div></div>
      <div class="kpi valor"><div class="lab">Valor pendente</div><div class="val">${formatMoney(st.valorPend,cur)}</div></div>
    </div>`;
  }
  function offendersCard(offenders, cur){
    const items = offenders.slice(0,12).map((o,i)=>{
      const logo=getMlpLogo(o.mlp);
      const img = logo?`<img class="mlp-logo" src="${logo}" alt="" onerror="this.classList.add('ph');this.removeAttribute('src')">`
                      :`<span class="mlp-logo ph"></span>`;
      return `<li><span class="rank">${i+1}</span>${img}
        <span class="off-name" title="${escapeHtml(o.mlp)}">${escapeHtml(o.mlp)}</span>
        <span class="off-nums"><div class="off-count">${formatNumber(o.pendente)}</div>
        <div class="off-val">${formatMoney(o.valor,cur)}</div></span></li>`;
    }).join("");
    return `<div class="card"><div class="card-h">Principais ofensores</div>
      <ul class="offenders">${items||'<li style="color:var(--muted-fg)">Sem pendências.</li>'}</ul></div>`;
  }

  /* -------- Tabela (cashout/bpp/pnr) -------- */
  function renderTableView(tab){
    const rows=state.data[tab]; const cfg=TABS[tab]; const f=state.filters;
    const mlps=uniqueValues(rows,tab,r=>getMlp(r,tab)).sort((a,b)=>a.localeCompare(b,"pt-BR"));
    const weeks=uniqueValues(rows,tab,r=>getWeek(r,tab)).sort((a,b)=>Number(b)-Number(a));
    const filtered=applyFilters(rows, tab, f);
    const fstats=computeStats(filtered, tab);
    const pendingTotal = rows.filter(r=>!isTratado(r)).length;

    const opt=(v,cur,lab)=>`<option value="${escapeHtml(v)}" ${v===cur?"selected":""}>${escapeHtml(lab)}</option>`;
    const mlpOpts=`<option value="all">Todas as MLPs</option>`+mlps.map(m=>opt(m,f.mlp,m)).join("");
    const weekOpts=`<option value="all">Todas</option>`+weeks.map(w=>opt(w,f.week,"Semana "+w)).join("");

    document.getElementById("view").innerHTML = `
      ${kpiCards(fstats, cfg.currency)}
      <div class="grid-main">
        ${offendersCard(fstats.offenders, cfg.currency)}
        <div class="card">
          <div class="filters">
            <div class="field"><label>MLP</label><select onchange="setFilter('mlp',this.value)">${mlpOpts}</select></div>
            <div class="field"><label>Semana</label><select onchange="setFilter('week',this.value)">${weekOpts}</select></div>
            <div class="field grow"><label>Buscar</label><input type="search" value="${escapeHtml(f.q)}" placeholder="ID, item, motivo…" oninput="setFilter('q',this.value)"></div>
            <button class="toggle ${f.onlyPending?'on':''}" onclick="setFilter('onlyPending',${!f.onlyPending})">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/></svg>
              ${f.onlyPending?'Mostrando só pendentes de justificar':'Só pendentes de justificar'}
            </button>
            <span class="pend-count"><b>${formatNumber(pendingTotal)}</b> pendente(s) de justificar</span>
          </div>
          ${tableHtml(filtered, tab)}
        </div>
      </div>`;
  }

  function tableHtml(rows, tab){
    const cfg=TABS[tab]; const cur=cfg.currency; const hv=highValueThreshold(cur);
    const MAX=1000; const shown=rows.slice(0,MAX);
    const head=`<thead class="${tab==='cashout'?'orange':''}"><tr>${cfg.columns.map(c=>`<th>${escapeHtml(c.label)}</th>`).join("")}</tr></thead>`;
    const body=shown.map(r=>{
      const tratado=isTratado(r);
      const isHigh=cfg.highValue && getValue(r,tab)>=hv;
      const tds=cfg.columns.map(c=>{
        const raw=r[c.key];
        if(c.logo){
          const name=cleanText(raw)||getMlp(r,tab); const logo=getMlpLogo(name);
          const img=logo?`<img class="mlp-logo" src="${logo}" alt="" onerror="this.classList.add('ph');this.removeAttribute('src')">`:`<span class="mlp-logo ph"></span>`;
          return `<td><div class="mlp-cell">${img}<span title="${escapeHtml(name)}">${escapeHtml(name)}</span></div></td>`;
        }
        if(c.id){
          const id=cleanText(raw);
          const btn = (!tratado && id) ? `<a class="btn-justify" href="${FORM_URL}" target="_blank" rel="noopener noreferrer">Justificar
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a>`:"";
          return `<td><div class="id-cell"><span class="id-txt">${escapeHtml(id||"—")}</span>${btn}</div></td>`;
        }
        if(c.type==="money"){ const v=parseMoney(raw); return `<td class="money ${isHigh?'hv-flag':''}">${formatMoney(v,cur)}</td>`; }
        if(c.type==="classification"){ return `<td>${escapeHtml(translateClassification(raw)||"—")}</td>`; }
        if(c.type==="status"){ return `<td>${tratado?'<span class="pill ok">Tratado</span>':'<span class="pill pend">Pendente</span>'}</td>`; }
        const t=cleanText(raw); return `<td><div class="clamp" title="${escapeHtml(t)}">${escapeHtml(t||"—")}</div></td>`;
      }).join("");
      return `<tr class="${tratado?'tratado':''}">${tds}</tr>`;
    }).join("");
    const hvCount = cfg.highValue ? rows.filter(r=>getValue(r,tab)>=hv).length : 0;
    const banner = hvCount>0 ? `<div class="hv-banner"><b>${formatNumber(hvCount)}</b>&nbsp;registro(s) High Value (acima de ${formatMoney(hv,cur)})</div>`:"";
    const more = rows.length>MAX ? `<div class="hv-banner">Mostrando ${formatNumber(MAX)} de ${formatNumber(rows.length)} linhas.</div>`:"";
    return `${banner}${more}<div class="tbl-scroll"><table>${head}<tbody>${body||`<tr><td colspan="${cfg.columns.length}" style="text-align:center;color:var(--muted-fg);padding:40px">Nenhum registro para os filtros.</td></tr>`}</tbody></table></div>`;
  }

  function setFilter(key,val){ state.filters[key]=val; renderView(); }

  /* -------- Acompanhamento: 3 donuts de status -------- */
  function renderAcompanhamento(){
    const f=state.acomp;
    const mlpSet=new Set(), weekSet=new Set();
    for(const tab of SOURCE_TABS){ for(const r of state.data[tab]){ mlpSet.add(getMlp(r,tab)); const w=getWeek(r,tab); if(w) weekSet.add(w); } }
    const mlps=[...mlpSet].sort((a,b)=>a.localeCompare(b,"pt-BR"));
    const weeks=[...weekSet].sort((a,b)=>Number(b)-Number(a));
    const opt=(v,cur,lab)=>`<option value="${escapeHtml(v)}" ${v===cur?"selected":""}>${escapeHtml(lab)}</option>`;

    const cards = SOURCE_TABS.map(tab=>{
      const filtered=applyFilters(state.data[tab], tab, {mlp:f.mlp,week:f.week,onlyPending:false,q:""});
      const st=computeStats(filtered, tab); const cur=TABS[tab].currency;
      const pct=st.total?Math.round(st.tratado/st.total*100):0;
      return `<div class="card">
        <div class="card-h">${TABS[tab].label}</div>
        <div class="card-sub">${formatNumber(st.total)} casos &middot; ${formatMoney(st.valorPend,cur)} pendente</div>
        <div class="donut-wrap"><canvas id="donut-${tab}"></canvas>
          <div class="donut-center"><div class="n">${pct}%</div><div class="l">tratado</div></div></div>
        <div class="legend">
          <button style="cursor:default"><span class="dot" style="background:var(--chart-1)"></span><span class="lg-name">Tratados</span><span class="lg-num">${formatNumber(st.tratado)}</span></button>
          <button style="cursor:default"><span class="dot" style="background:var(--chart-3)"></span><span class="lg-name">Pendentes</span><span class="lg-num">${formatNumber(st.pendente)}</span></button>
        </div></div>`;
    }).join("");

    document.getElementById("view").innerHTML = `
      <div class="card mb20"><div class="filters">
        <div class="field"><label>MLP</label><select onchange="setAcomp('mlp',this.value)"><option value="all">Todas as MLPs</option>${mlps.map(m=>opt(m,f.mlp,m)).join("")}</select></div>
        <div class="field"><label>Semana</label><select onchange="setAcomp('week',this.value)"><option value="all">Todas as semanas</option>${weeks.map(w=>opt(w,f.week,"Semana "+w)).join("")}</select></div>
      </div></div>
      <div class="charts-grid">${cards}</div>`;

    SOURCE_TABS.forEach(tab=>{
      const filtered=applyFilters(state.data[tab], tab, {mlp:f.mlp,week:f.week,onlyPending:false,q:""});
      const st=computeStats(filtered, tab);
      charts["donut-"+tab]=new Chart(document.getElementById("donut-"+tab),{
        type:"doughnut",
        data:{labels:["Tratados","Pendentes"],datasets:[{data:[st.tratado,st.pendente],backgroundColor:["#2fa572","#d6453b"],borderWidth:2,borderColor:"#fff"}]},
        options:{cutout:"68%",plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.label}: ${formatNumber(c.raw)}`}}},maintainAspectRatio:false}
      });
    });
  }
  function setAcomp(k,v){ state.acomp[k]=v; renderView(); }

  /* -------- Análise Cashout: donut de Classificação LM com filtro -------- */
  function renderAnalise(){
    const rows=state.data.cashout; const cur=TABS.cashout.currency;
    const dist=classDistribution(rows);
    const hidden=state.classHidden;
    const visible=dist.filter(d=>!hidden.has(d.label));
    const totalVis=visible.reduce((s,d)=>s+d.count,0);

    const legend=dist.map((d,i)=>{
      const color=CHART_COLORS[i%CHART_COLORS.length];
      const isHidden=hidden.has(d.label);
      const pct=totalVis&&!isHidden?(Math.round(d.count/totalVis*1000)/10):0;
      return `<button class="${isHidden?'off':''}" onclick="toggleClass('${escapeHtml(d.label).replace(/'/g,"\\'")}')">
        <span class="dot" style="background:${isHidden?'transparent':color};border:1px solid ${color}"></span>
        <span class="lg-name">${escapeHtml(d.label)}</span>
        <span class="lg-pct">${isHidden?'—':pct+'%'}</span>
        <span class="lg-num">${formatNumber(d.count)}</span>
        <span class="lg-val">${formatMoney(d.valor,cur)}</span></button>`;
    }).join("");

    document.getElementById("view").innerHTML = `
      <div class="card">
        <div class="card-h">Classificação LM (Cashout)</div>
        <div class="card-sub">Distribuição dos casos de cashout por tipo.</div>
        <div class="charts-grid" style="grid-template-columns:1fr 1fr;padding:0 8px 8px">
          <div class="donut-wrap" style="height:320px"><canvas id="classDonut"></canvas>
            <div class="donut-center"><div class="n">${formatNumber(totalVis)}</div><div class="l">casos</div></div></div>
          <div class="legend">${legend}</div>
        </div>
      </div>`;

    charts["classDonut"]=new Chart(document.getElementById("classDonut"),{
      type:"doughnut",
      data:{labels:visible.map(d=>d.label),datasets:[{data:visible.map(d=>d.count),
        backgroundColor:visible.map(d=>CHART_COLORS[dist.findIndex(x=>x.label===d.label)%CHART_COLORS.length]),
        borderWidth:2,borderColor:"#fff"}]},
      options:{cutout:"66%",plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.label}: ${formatNumber(c.raw)}`}}},maintainAspectRatio:false}
    });
  }
  function toggleClass(label){
    if(state.classHidden.has(label)) state.classHidden.delete(label); else state.classHidden.add(label);
    renderView();
  }

  /* -------- Resumo KPIs: barras de pendências por MLP (3 fontes empilhadas) -------- */
  function renderResumo(){
    const f=state.resumo;
    const weekSet=new Set();
    for(const tab of SOURCE_TABS){ for(const r of state.data[tab]){ const w=getWeek(r,tab); if(w) weekSet.add(w); } }
    const weeks=[...weekSet].sort((a,b)=>Number(b)-Number(a));
    const opt=(v,cur,lab)=>`<option value="${escapeHtml(v)}" ${v===cur?"selected":""}>${escapeHtml(lab)}</option>`;

    const byMlp=new Map();
    let tot={total:0,pend:0,trat:0};
    for(const tab of SOURCE_TABS){
      const filtered=applyFilters(state.data[tab], tab, {mlp:"all",week:f.week,onlyPending:false,q:""});
      for(const r of filtered){
        tot.total++;
        if(isTratado(r)){ tot.trat++; continue; }
        tot.pend++;
        const mlp=getMlp(r,tab);
        const cur=byMlp.get(mlp)||{cashout:0,bpp:0,pnr:0,total:0};
        cur[tab]++; cur.total++; byMlp.set(mlp,cur);
      }
    }
    const ranked=[...byMlp.entries()].map(([mlp,v])=>({mlp,...v})).sort((a,b)=>b.total-a.total).slice(0,15);
    const pct=tot.total?Math.round(tot.trat/tot.total*100):0;

    document.getElementById("view").innerHTML = `
      <div class="kpis">
        <div class="kpi total"><div class="lab">Total (3 bases)</div><div class="val">${formatNumber(tot.total)}</div></div>
        <div class="kpi pend"><div class="lab">Pendentes</div><div class="val">${formatNumber(tot.pend)}</div></div>
        <div class="kpi trat"><div class="lab">Tratados</div><div class="val">${formatNumber(tot.trat)} (${pct}%)</div></div>
        <div class="kpi valor"><div class="lab">MLPs com pendência</div><div class="val">${formatNumber(byMlp.size)}</div></div>
      </div>
      <div class="card">
        <div class="filters">
          <div class="field"><label>Semana</label><select onchange="setResumo('week',this.value)"><option value="all">Todas as semanas</option>${weeks.map(w=>opt(w,f.week,"Semana "+w)).join("")}</select></div>
          <span class="pend-count">Top ${ranked.length} MLPs por pendências</span>
        </div>
        <div class="bar-wrap"><canvas id="mlpBar"></canvas></div>
      </div>`;

    charts["mlpBar"]=new Chart(document.getElementById("mlpBar"),{
      type:"bar",
      data:{labels:ranked.map(r=>r.mlp),datasets:[
        {label:"Cashout",data:ranked.map(r=>r.cashout),backgroundColor:"#e06a3b"},
        {label:"BPP",data:ranked.map(r=>r.bpp),backgroundColor:"#3d7fd6"},
        {label:"PNR",data:ranked.map(r=>r.pnr),backgroundColor:"#2fa572"},
      ]},
      options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,
        scales:{x:{stacked:true,ticks:{precision:0}},y:{stacked:true}},
        plugins:{legend:{position:"top"},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${formatNumber(c.raw)}`}}}}
    });
  }
  function setResumo(k,v){ state.resumo[k]=v; renderView(); }

  /* ============================================================
     REFRESH / INIT
     ============================================================ */
  async function refreshAll(){
    const icon=document.getElementById("refreshIcon"); const btn=document.getElementById("refreshBtn");
    icon.classList.add("spin"); btn.disabled=true;
    state.loading=true; state.error=null; renderView();
    try{
      const [c,b,p]=await Promise.all(SOURCE_TABS.map(fetchTab));
      state.data={cashout:c,bpp:b,pnr:p}; state.loading=false;
      state.stamp="Atualizado às "+new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
    }catch(e){ state.loading=false; state.error=e.message||"Falha ao carregar dados."; }
    document.getElementById("stamp").textContent=state.stamp;
    icon.classList.remove("spin"); btn.disabled=false;
    renderView();
  }

  renderNav();
  refreshAll();
</script>
</body>
</html>
